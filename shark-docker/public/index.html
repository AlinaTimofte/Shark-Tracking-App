<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Tracker</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    
    <div id="map"></div>
    <div class="security-bar">
        <span id="security-status">Checking security status...</span>
    </div>

    <div class="card">
        <img id="shark-image" src="images/placeholder_shark.jpg" alt="Shark" class="shark-photo">
        
        <span id="tag" class="tag">Loading...</span>
        <span id="precision-label" class="precision">public</span>
        
        <h1 id="shark-name">Shark Name</h1>
        <p id="shark-description">Description loading...</p>

        <div class="info">
            <div class="info-box">
                <h3>Gender</h3>
                <span id="shark-type">--</span>
            </div>
            <div class="info-box">
                <h3>Length</h3>
                <span id="shark-length">--</span>
            </div>
            <div class="info-box">
                <h3>Weight</h3>
                <span id="shark-weight">--</span>
            </div>
            <div class="info-box">
                <h3>Zone</h3>
                <span id="shark-zone">--</span>
            </div>
        </div>

        <button class="next-button" onclick="nextShark()">Locate Next Shark</button>
    </div>

    <aside class="security-panel">
        <form id="login-form">
            <div id="login-panel">
                <h2>Admin Access</h2>
                <input id="username" type="text" placeholder="Username" autocomplete="username" required>
                <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
                <button type="submit">Login</button>
            </div>
        </form>

        <div id="admin-panel" class="hidden">
            <div class="panel-header">
                <h2>Security Console</h2>
                <button id="logout-button" type="button">Logout</button>
            </div>
            <div class="admin-action">
                <span>Move current shark</span>
                <small id="move-coords">Click the map</small>
                <button id="move-button" type="button" disabled>Save Exact Location</button>
            </div>
            <div class="admin-action">
                <span>RSA-signed reports</span>
                <ul id="pending-list"></ul>
            </div>
        </div>
    </aside>

    <div id="report-modal" class="modal hidden">
        <form id="report-form" class="modal-content">
            <h2>Report Shark Sighting</h2>
            <small>Selected coordinates: <span id="click-coords">--</span></small>
            <input id="reporter" type="text" placeholder="Your name">
            <textarea id="report-description" rows="4" placeholder="Describe what you saw" required></textarea>
            <div class="modal-actions">
                <button id="close-report" type="button">Cancel</button>
                <button type="submit">Sign and Submit</button>
            </div>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="script.js"></script>
</body>
</html>
